name: Deploy public-site to GitHub Pages

# Builds and publishes public-site/ to GitHub Pages on every push to main.
# The marketing landing page, blog posts, and SDK docs all live there.

on:
  push:
    branches: [main]
    paths:
      - "public-site/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Upload public-site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public-site
      - id: deployment
        uses: actions/deploy-pages@v4
